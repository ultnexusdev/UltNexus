services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ultnexus-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    volumes:
      - ./data:/app/data
    networks:
      - ultnexus

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://backend:4000/content
    container_name: ultnexus-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:4000/content
    depends_on:
      - backend
    networks:
      - ultnexus

networks:
  ultnexus:
    driver: bridge
